services:
  broker:
    image: confluentinc/cp-kafka:8.2.2
    container_name: broker
    ports:
      - "29092:29092"
      - "29093:29093"
    hostname: broker
    environment:
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJEMTJBREU2Qjk1ODc1ODc1RDRERDQ=}
    networks:
      - solar-net
      - default
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD","kafka-topics","--bootstrap-server","localhost:9092","--list"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: always

  spark:
    build:
      context: ./streaming
      dockerfile: Dockerfile
    container_name: spark
    env_file:
      - .env
    networks: [solar-net, default]
    ports:
      - "4040:4040"
    mem_limit: 2g
    volumes:
      - ./streaming:/app
      - ./data/delta:/data/delta
    depends_on:
      broker:
        condition: service_healthy
      timescale_db:
        condition: service_healthy
    restart: no

  timescale_db:
    image: timescale/timescaledb:latest-pg16
    networks:
      - solar-net
      - default
    container_name: timescale_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-solar_db}
      POSTGRES_USER: ${TIMESCALE_USER:-tsdb}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-tsdb123}
    volumes:
      - tsdb-data:/var/lib/postgresql/data
      - ./tsdb/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: always

  deye-poller:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    networks:
      - solar-net
    env_file:
      - .env
    volumes:
      - ./data/backfill:/app/data/backfill
    depends_on:
      broker:
        condition: service_healthy
    restart: always

  grafana:
    image: grafana/grafana:latest
    networks:
      - solar-net
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - timescale_db
    restart: always

  kafka-ui:
    image: kafbat/kafka-ui:096140b
    networks:
      - solar-net
    ports:
      - "8090:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: 'true'
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:29092
    depends_on:
      broker:
        condition: service_healthy

volumes:
  kafka-data:
  tsdb-data:
  grafana-data:

networks:
  solar-net:
    driver: bridge
  default:
    driver: bridge
